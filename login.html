<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Fast Aid</title>
  <link rel="stylesheet" href="style/style.css" />
</head>
<body>

   <a href="index.html" class="btn-voltar">
    <img src="images/seta.png" alt="Voltar">
  </a>

  <div class="logocima">
    <img src="images/logo.png" alt="Fast Aid Logo">
     <p id="titulofooter">Fast Aid</p>
  </div>

  <section class="form">


<div class="formcard">
<h1>Fazer login</h1>


<form novalidate>


<div class="inp">
<label>E-mail</label>
<input type="email" required placeholder="Digite seu e-mail" />
</div>


<div class="inp">
<label>Senha</label>
<input type="password" required placeholder="Digite sua senha" />
</div>


<button class="btn">Entrar</button>
</form>


<p class="linklogin">Não possui uma conta? <a href="cadastro.html">Cadastrar-se</a></p>
</div>


</section>

</body>
</html>
